                K

        </button>

                    <span class="flex items-center gap-3">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vid="20"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" vid="21"></path><polyline points="22,6 12,13 2,6" vid="22"></polyline></svg>
                        inbox

                </button>
                <button type="button" data-action="switch-view" data-view="today" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm transition-all lowercase w-full" vid="23">

                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vid="192"><path d="M12 2a10 10 0 1 0 10 10" vid="193"></path><path d="M12 8v4l3 3" vid="194"></path><circle cx="19" cy="5" r="3" fill="currentColor" stroke="none" vid="195"></circle></svg>
                </div>
                <div class="flex items-center gap-2" vid="196">

                    <span class="px-2 py-0.5 bg-stone-100 text-stone-500 rounded-full text-[10px] font-bold tracking-wide uppercase" vid="198">beta</span>

            </div>

                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vid="200"><line x1="18" y1="6" x2="6" y2="18" vid="201"></line><line x1="6" y1="6" x2="18" y2="18" vid="202"></line></svg>
            </button>
        </div>

        </div>

        <div id="aiMessages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6" aria-live="polite" vid="222"></div>

        
        <div class="p-4 bg-white border-t border-stone-100 z-10 flex-shrink-0" vid="226">

        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="7" x2="20" y2="7"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>

        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            <path d="M8 9h8"></path>

    </button>
